<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nostalgia</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <h2>📸 Nostalgia</h2>
    </header>

    <div class="popup-content">
      <div class="popup-stats">
        <div class="stat-item">
          <span class="stat-label">Saved Posts</span>
          <span id="total-posts" class="stat-value">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Collections</span>
          <span id="total-collections" class="stat-value">0</span>
        </div>
      </div>

      <div class="popup-actions">
        <button id="open-main" class="btn btn-primary w-full">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
          </svg>
          Open Gallery
        </button>
        
        <button id="sync-now" class="btn btn-secondary w-full">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0118.8-4.3M22 12.5a10 10 0 01-18.8 4.3"/>
          </svg>
          Sync Now
        </button>

        <button id="clear-storage" class="btn btn-danger w-full">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
          </svg>
          Clear Storage
        </button>
      </div>

      <div id="popup-status" class="popup-status hidden"></div>

      <div class="popup-footer">
        <p class="footer-text">Your Instagram saved posts, backed up</p>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
