<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nostalgia - Your Saved Posts</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="container header-content">
      <a href="#" class="logo">
        <img src="logo192.png" alt="Nostalgia" class="logo-icon">
        <span class="logo-text">Nostalgia</span>
      </a>
      
      <div class="header-actions">
        <button id="sync-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0118.8-4.3M22 12.5a10 10 0 01-18.8 4.3"/>
          </svg>
          Sync Posts
        </button>
      </div>
    </div>
  </header>

  <div class="app-layout">
    <!-- Sidebar (Desktop) -->
    <aside class="sidebar">
      <div class="sidebar-section">
        <h3 class="sidebar-title">Search</h3>
        <div class="search-container">
          <input type="text" id="search-input" placeholder="Search posts..." />
        </div>
      </div>

      <div class="sidebar-section">
        <h3 class="sidebar-title">Filters</h3>
        <div class="filter-group">
          <label class="filter-label">Sort by</label>
          <select id="sort-select">
            <option value="newest">Newest First</option>
            <option value="oldest">Oldest First</option>
            <option value="random">Random</option>
          </select>
        </div>

        <div class="filter-group">
          <label class="filter-label">Type</label>
          <select id="type-filter">
            <option value="all">All Posts</option>
            <option value="photo">Photos Only</option>
            <option value="video">Videos Only</option>
          </select>
        </div>
      </div>

      <div class="sidebar-section">
        <h3 class="sidebar-title">Popular Hashtags</h3>
        <div id="hashtag-chips"></div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Mobile Filters Toggle -->
      <button id="mobile-filters-toggle" class="mobile-filters-toggle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
          <line x1="4" y1="21" x2="4" y2="14"/>
          <line x1="4" y1="10" x2="4" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="12"/>
          <line x1="12" y1="8" x2="12" y2="3"/>
          <line x1="20" y1="21" x2="20" y2="16"/>
          <line x1="20" y1="12" x2="20" y2="3"/>
          <circle cx="4" cy="12" r="2"/>
          <circle cx="12" cy="10" r="2"/>
          <circle cx="20" cy="14" r="2"/>
        </svg>
        Filters
      </button>

      <!-- Sync Status -->
      <div id="sync-status" class="sync-status"></div>

      <!-- Stats Bar -->
      <div class="stats-bar">
        <span id="filtered-count">Loading...</span>
        <span id="page-info"></span>
      </div>

      <!-- Posts Grid -->
      <div id="posts-container"></div>

      <!-- Pagination -->
      <div id="pagination"></div>
    </main>
  </div>

  <!-- Mobile Filters Drawer -->
  <div id="mobile-filters-drawer" class="mobile-filters-drawer">
    <div class="drawer-header">
      <h3>Filters</h3>
      <button id="close-filters" class="close-filters">&times;</button>
    </div>
    <div class="drawer-content">
      <div class="filter-group">
        <label class="filter-label">Search</label>
        <input type="text" id="search-input-mobile" placeholder="Search posts..." class="search-input-mobile" />
      </div>
      <div class="filter-group">
        <label class="filter-label">Sort by</label>
        <select id="sort-select-mobile">
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
          <option value="random">Random</option>
        </select>
      </div>
      <div class="filter-group">
        <label class="filter-label">Type</label>
        <select id="type-filter-mobile">
          <option value="all">All Posts</option>
          <option value="photo">Photos Only</option>
          <option value="video">Videos Only</option>
        </select>
      </div>
      <div class="filter-group">
        <label class="filter-label">Hashtags</label>
        <div id="hashtag-chips-mobile"></div>
      </div>
    </div>
  </div>
  <div id="drawer-overlay" class="drawer-overlay"></div>

  <!-- Modal -->
  <div id="modal" class="modal">
    <button id="modal-close">&times;</button>
    
    <div class="modal-content">
      <div class="modal-media-container">
        <div id="modal-media"></div>
      </div>
      <div class="modal-info">
        <div class="modal-header">
          <h3 id="modal-title"></h3>
          <p id="modal-username"></p>
        </div>
        <div class="modal-caption-container">
          <p id="modal-caption"></p>
          <div id="modal-hashtags"></div>
        </div>
        <div class="modal-actions">
          <a id="modal-link" href="#" target="_blank" rel="noopener noreferrer">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/>
            </svg>
            View on Instagram
          </a>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
